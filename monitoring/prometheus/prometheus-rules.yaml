apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: prometheus
data:
  alert.rules.yml: |
    groups:
      - name: pod-health
        rules:
          - alert: KubernetesPodScrapeDown
            expr: up{job="kubernetes-pods"} == 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Prometheus scrape target is down"
              description: "Target {{ $labels.instance }} in job {{ $labels.job }} has been down for more than 1 minute."