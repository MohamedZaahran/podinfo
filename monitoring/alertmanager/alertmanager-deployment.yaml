apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config-volume
              mountPath: /etc/alertmanager
          env:
            - name: GMAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alertmanager-gmail
                  key: password
      volumes:
        - name: config-volume
          configMap:
            name: alertmanager-config